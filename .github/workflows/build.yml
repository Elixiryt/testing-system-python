name: Build EXE for Windows

on: [push]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4  # Оновлено до v4

    - name: Set up Python
      uses: actions/setup-python@v5 # Оновлено до v5
      with:
        python-version: '3.10'

    - name: Install PyInstaller
      run: pip install pyinstaller

    - name: Install dependencies
      run: |
        if (Test-Path requirements.txt) { pip install -r requirements.txt }

    - name: Build with PyInstaller
      run: pyinstaller --onefile --windowed --collect-all . index.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4 # Оновлено до v4 (це виправить помилку)
      with:
        name: Windows-Executable
        path: dist/index.exe
